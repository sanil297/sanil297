<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sanil Modi — Resume</title>

  <style>
    :root {
      --bg: #0f0f0f;
      --card: #181818;
      --text: #ffffff;
      --muted: #9ca3af;
      --accent: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 20px 32px;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    p {
      color: var(--muted);
      margin-bottom: 28px;
      font-size: 14px;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .btn {
      padding: 12px 18px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: black;
    }

    .btn-primary:hover {
      opacity: 0.85;
    }

    .btn-secondary {
      border: 1px solid #2a2a2a;
      color: white;
    }

    .btn-secondary:hover {
      background: #1f1f1f;
    }

    /* Resume wrapper */
    .resume-wrapper {
      display: flex;
      justify-content: center;
      padding-bottom: 40px;
    }

    .resume-card {
      width: 100%;
      max-width: 850px;
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    iframe {
      width: 100%;
      height: 90vh;
      border: none;
      display: block;
    }

    /* Mobile tweaks */
    @media (max-width: 768px) {
      h1 {
        font-size: 22px;
      }

      iframe {
        height: 80vh;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Sanil Modi — Resume</h1>
    <p>Senior Product Designer • Design Systems • Fintech</p>

    <div class="actions">
      <a class="btn btn-primary" href="../documents/Sanil_Modi_Resume.pdf" download>
        Download Resume
      </a>

      <a class="btn btn-secondary" href="../documents/Sanil_Modi_Resume.pdf" target="_blank">
        Open Full Screen
      </a>
    </div>

    <div class="resume-wrapper">
      <div class="resume-card">
        <iframe 
          src="/documents/resume.pdf#toolbar=0&navpanes=0&scrollbar=0">
        </iframe>
      </div>
    </div>
  </div>

</body>
</html>
